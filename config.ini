[Database]
# Chemin vers la base de données SQLite
# Chemins supportés:
#   - Chemin absolu: C:\Data\BacklogManager\backlog.db
#   - Chemin relatif: data\backlog.db (relatif au dossier de l'application)
#   - Réseau: \\serveur\partage\backlog.db
#
[Database]
# Chemin vers la base de données SQLite
# Chemins supportés:
#   - Chemin absolu: C:\Data\BacklogManager\backlog.db
#   - Chemin relatif: data\backlog.db (relatif au dossier de l'application)
#   - Réseau: \\serveur\partage\backlog.db
# LOCAL (tests):
DatabasePath=C:\sgi_support\backlog.db
# PRODUCTION (décommenter et adapter):
# DatabasePath=\\pardmp13sh\opscib\GARINTER\MOA\0-Moulinettes SGI\BacklogManagerDb\backlog.db

[Sync]
# Architecture local-first : chaque poste possède sa propre DB SQLite locale (WAL).
# Le NAS sert uniquement à la synchronisation des opérations entre postes.
#
# Chemin NAS vers le dossier de synchronisation partagé (VIDE = synchro désactivée)
# Exemple réseau : \\pardmp13sh\opscib\GARINTER\MOA\0-Moulinettes SGI\BacklogManagerSync
# LOCAL (tests) :
NasSyncPath=
# PRODUCTION (décommenter et adapter) :
# NasSyncPath=\\pardmp13sh\opscib\GARINTER\MOA\0-Moulinettes SGI\BacklogManagerSync
#
# Chemin local DB (laisser vide = %APPDATA%\BacklogManager\local.db par défaut)
LocalDatabasePath=

[Update]
# Chemin vers le serveur de mise à jour (partage réseau Windows)
# Exemple: \\serveur\partage\BacklogManager\Updates
# LOCAL (tests) - Dossier local pour tester les mises à jour:
UpdateServerPath=C:\sgi_support\Updates
# PRODUCTION (décommenter et adapter):
# UpdateServerPath=\\pardmp13sh\opscib\GARINTER\MOA\0-Moulinettes SGI\BacklogManagerDb\Updates
